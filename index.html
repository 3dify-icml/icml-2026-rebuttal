<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3Dify ICML Rebuttal</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7fb;
        --panel: #ffffff;
        --text: #101828;
        --muted: #475467;
        --accent: #0f766e;
        --border: #d0d5dd;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Avenir Next", Avenir, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(15, 118, 110, 0.12), transparent 35%),
          linear-gradient(180deg, #fbfcff 0%, var(--bg) 100%);
        color: var(--text);
      }

      main {
        width: min(680px, 100%);
        padding: 40px 32px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: color-mix(in srgb, var(--panel) 92%, white);
        box-shadow: 0 24px 60px rgba(16, 24, 40, 0.08);
      }

      .eyebrow {
        margin: 0 0 12px;
        font-size: 0.9rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 4vw, 3.25rem);
        line-height: 1.05;
      }

      p {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.7;
      }

      code {
        padding: 0.15rem 0.4rem;
        border-radius: 999px;
        background: #ecfdf3;
        color: #027a48;
        font-size: 0.95em;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">GitHub Pages</p>
      <h1>Hello, ICML rebuttal.</h1>
      <p>This site is live and ready for qualitative visual results.</p>
      <p>Repository owner: <code>3dify-icml</code></p>
      <p>Replace this file with your actual rebuttal figures whenever you are ready.</p>
    </main>
  </body>
</html>
