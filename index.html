<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3Dify ICML Rebuttal</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7fb;
        --panel: #ffffff;
        --text: #101828;
        --muted: #475467;
        --accent: #0f766e;
        --border: #d0d5dd;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 24px;
        font-family:
          "EB Garamond",
          Garamond,
          "Iowan Old Style",
          "Palatino Linotype",
          "Book Antiqua",
          "Times New Roman",
          serif;
        background:
          radial-gradient(circle at top, rgba(15, 118, 110, 0.12), transparent 35%),
          linear-gradient(180deg, #fbfcff 0%, var(--bg) 100%);
        color: var(--text);
      }

      main {
        width: min(960px, 100%);
        margin: 0 auto;
        padding: 40px 32px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: color-mix(in srgb, var(--panel) 92%, white);
        box-shadow: 0 24px 60px rgba(16, 24, 40, 0.08);
      }

      .eyebrow {
        margin: 0 0 12px;
        font-size: 0.9rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 4vw, 3.25rem);
        line-height: 1.05;
      }

      h2 {
        margin: 0 0 14px;
        font-size: clamp(1.5rem, 3vw, 2rem);
        line-height: 1.15;
      }

      p {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.7;
      }

      .intro {
        margin-bottom: 32px;
      }

      .result {
        padding-top: 28px;
        border-top: 1px solid var(--border);
      }

      .result-card {
        margin-top: 20px;
      }

      .result-image {
        width: 50%;
        max-width: 100%;
        border-radius: 12px;
        display: block;
        margin: 0 auto;
      }

      .caption {
        margin-top: 14px;
        margin-bottom: 0;
        text-align: center;
      }

      code {
        padding: 0.15rem 0.4rem;
        border-radius: 999px;
        background: #ecfdf3;
        color: #027a48;
        font-size: 0.95em;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="intro">
        <h1>ICML rebuttal visual results</h1>
      </section>

      <section class="result">
        <h2>1. Comparison with MVAR</h2>

        <div class="result-card">
          <img
            class="result-image"
            src="3dify-1.png"
            alt="Qualitative comparison with MVAR"
          />
          <p class="caption">
            We ran a small qualitative comparison between our model and MVAR.
            Since MVAR is fundamentally a multi-view generation model, we used
            Trellis pipeline to reconstruct the meshes from multi-views.
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
